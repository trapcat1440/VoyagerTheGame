<!DOCTYPE html>
<html>
<head>
    <title>VoyagersTheGame</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        .scene {
            display: none;
            width: 100%;
            max-width: 800px;
        }

        #scene1 {
            display: block;
        }

        .buttons {
            position: fixed;
            bottom: 20px;
            left: 20px;
        }

        .button {
            padding: 12px 24px;
            font-size: 16px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>VoyagersTheGame</h1>

<!-- Scenes -->
<div id="scene1" class="scene"><img src="https://i.imghippo.com/files/Cfk3543Xsw.png"></div>
<div id="scene2" class="scene"><img src="https://i.imghippo.com/files/NIgE5175CAg.png"></div>
<div id="scene3" class="scene"><img src="https://i.imghippo.com/files/zGQO1694gpg.png"></div>
<div id="scene4" class="scene"><img src="https://i.imghippo.com/files/gN5040sr.png"></div>
<div id="scene5" class="scene"><img src="https://i.imghippo.com/files/PNxq8874Ktg.png"></div>
<div id="scene6" class="scene"><img src="https://i.imghippo.com/files/XmQ3925zgs.png"></div>
<div id="scene7" class="scene"><img src="https://i.imghippo.com/files/HVa6589qe.png"></div>
<div id="scene8" class="scene"><img src="https://i.imghippo.com/files/itZZ3743LE.png"></div>

<!-- Buttons fixed bottom-left -->
<div class="buttons">
    <button class="button" onclick="changeScene(-1)">Back</button>
    
    <button class="button" onclick="changeScene(1)">Next</button>
</div>

<script>
    let currentScene = 1;
    const totalScenes = 8;

    const backgrounds = {
        1: "https://i.imghippo.com/files/Cfk3543Xsw.png",
        2: "https://i.imghippo.com/files/oBqd6225ELs.png",
        3: "https://i.imghippo.com/files/zGQO1694gpg.png",
        4: "https://i.imghippo.com/files/gN5040sr.png",
        5: "https://i.imghippo.com/files/PNxq8874Ktg.png",
        6: "https://i.imghippo.com/files/XmQ3925zgs.png",
        7: "https://i.imghippo.com/files/HVa6589qe.png",
        8: "https://i.imghippo.com/files/itZZ3743LE.png"
    };

    function changeScene(direction) {
        // Hide current
        document.getElementById("scene" + currentScene).style.display = "none";

        // Update scene number
        currentScene += direction;
        if(currentScene < 1) currentScene = 1;
        if(currentScene > totalScenes) currentScene = totalScenes;

        // Show new scene
        document.getElementById("scene" + currentScene).style.display = "block";

        // Update background
        document.body.style.backgroundImage = 'url("' + backgrounds[currentScene] + '")';
    }

    // Initialize first background
    document.body.style.backgroundImage = 'url("' + backgrounds[currentScene] + '")';
</script>

</body>
</html>
